<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Student-Teacher Booking System</title>
    <link rel="stylesheet" href="../src/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">📚 Appointment System</div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="login.html">Login</a></li>
                <li><a href="register.html">Register</a></li>
            </ul>
        </div>
    </nav>

    <div class="auth-container">
        <form id="loginForm" class="auth-form">
            <h2>Login</h2>
            
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>

            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>

            <p class="auth-link">Don't have an account? <a href="register.html">Register here</a></p>
        </form>
    </div>

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

    <!-- App Scripts -->
    <script src="../src/js/utils/logger.js"></script>
    <script src="../src/js/utils/firebaseConfig.js"></script>
    <script src="../src/js/utils/authService.js"></script>
    <script src="../src/js/pages/login.js"></script>
</body>
</html>
