<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Student-Teacher Booking System</title>
    <link rel="stylesheet" href="../src/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">📚 Appointment System</div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="login.html">Login</a></li>
                <li><a href="register.html">Register</a></li>
            </ul>
        </div>
    </nav>

    <div class="auth-container">
        <form id="registerForm" class="auth-form">
            <h2>Register</h2>

            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>

            <div class="form-group">
                <label for="role">Role</label>
                <select id="role" name="role" required>
                    <option value="">Select your role</option>
                    <option value="student">Student</option>
                    <option value="teacher">Teacher</option>
                </select>
            </div>

            <div class="form-group" id="departmentGroup" style="display: none;">
                <label for="department">Department</label>
                <input type="text" id="department" name="department">
            </div>

            <div class="form-group" id="subjectGroup" style="display: none;">
                <label for="subject">Subject</label>
                <input type="text" id="subject" name="subject">
            </div>

            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">Register</button>

            <p class="auth-link">Already have an account? <a href="login.html">Login here</a></p>
        </form>
    </div>

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

    <!-- App Scripts -->
    <script src="../src/js/utils/logger.js"></script>
    <script src="../src/js/utils/firebaseConfig.js"></script>
    <script src="../src/js/utils/authService.js"></script>
    <script src="../src/js/pages/register.js"></script>
</body>
</html>
