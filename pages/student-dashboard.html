<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - Student-Teacher Booking System</title>
    <link rel="stylesheet" href="../src/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">📚 Student Dashboard</div>
            <ul class="nav-menu">
                <li><a href="#" onclick="loadSection('dashboard')">Dashboard</a></li>
                <li><a href="#" onclick="loadSection('search')">Search Teachers</a></li>
                <li><a href="#" onclick="loadSection('appointments')">My Appointments</a></li>
                <li><a href="#" onclick="loadSection('profile')">Profile</a></li>
                <li><button onclick="logout()" class="btn btn-danger">Logout</button></li>
            </ul>
        </div>
    </nav>

    <div class="container dashboard-container">
        <!-- Dashboard Section -->
        <div id="dashboard" class="section">
            <h2>Welcome, <span id="studentName"></span></h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Total Appointments</h3>
                    <p class="stat-number" id="totalAppts">0</p>
                </div>
                <div class="stat-card">
                    <h3>Pending</h3>
                    <p class="stat-number" id="pendingAppts">0</p>
                </div>
                <div class="stat-card">
                    <h3>Approved</h3>
                    <p class="stat-number" id="approvedAppts">0</p>
                </div>
                <div class="stat-card">
                    <h3>Completed</h3>
                    <p class="stat-number" id="completedAppts">0</p>
                </div>
            </div>
        </div>

        <!-- Search Teachers Section -->
        <div id="search" class="section" style="display: none;">
            <h2>Find Teachers</h2>
            <form id="searchForm" class="search-form">
                <div class="form-group">
                    <label for="searchName">Teacher Name</label>
                    <input type="text" id="searchName" placeholder="Search by name">
                </div>
                <div class="form-group">
                    <label for="searchDept">Department</label>
                    <input type="text" id="searchDept" placeholder="Search by department">
                </div>
                <div class="form-group">
                    <label for="searchSubject">Subject</label>
                    <input type="text" id="searchSubject" placeholder="Search by subject">
                </div>
                <button type="submit" class="btn btn-primary">Search</button>
            </form>

            <div id="searchResults" class="list-container"></div>
        </div>

        <!-- Appointments Section -->
        <div id="appointments" class="section" style="display: none;">
            <h2>My Appointments</h2>
            <div id="appointmentsList" class="list-container"></div>
        </div>

        <!-- Profile Section -->
        <div id="profile" class="section" style="display: none;">
            <h2>My Profile</h2>
            <form id="profileForm">
                <div class="form-group">
                    <label for="profileName">Full Name</label>
                    <input type="text" id="profileName" required>
                </div>
                <div class="form-group">
                    <label for="profileEmail">Email</label>
                    <input type="email" id="profileEmail" disabled>
                </div>
                <div class="form-group">
                    <label for="profilePhone">Phone</label>
                    <input type="tel" id="profilePhone">
                </div>
                <button type="submit" class="btn btn-primary">Save Changes</button>
            </form>
        </div>
    </div>

    <!-- Book Appointment Modal -->
    <div id="bookAppointmentModal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2>Book Appointment</h2>
            <form id="bookAppointmentForm">
                <div class="form-group">
                    <label for="appointmentDate">Date</label>
                    <input type="date" id="appointmentDate" required>
                </div>
                <div class="form-group">
                    <label for="appointmentTime">Time</label>
                    <input type="time" id="appointmentTime" required>
                </div>
                <div class="form-group">
                    <label for="appointmentPurpose">Purpose</label>
                    <textarea id="appointmentPurpose" rows="4" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Book Now</button>
            </form>
        </div>
    </div>

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

    <!-- App Scripts -->
    <script src="../src/js/utils/logger.js"></script>
    <script src="../src/js/utils/firebaseConfig.js"></script>
    <script src="../src/js/utils/authService.js"></script>
    <script src="../src/js/modules/student.js"></script>
    <script src="../src/js/pages/student-dashboard.js"></script>
</body>
</html>
