<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - Student-Teacher Booking System</title>
    <link rel="stylesheet" href="../src/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">📚 Teacher Dashboard</div>
            <ul class="nav-menu">
                <li><a href="#" onclick="loadSection('dashboard')">Dashboard</a></li>
                <li><a href="#" onclick="loadSection('appointments')">Appointments</a></li>
                <li><a href="#" onclick="loadSection('messages')">Messages</a></li>
                <li><a href="#" onclick="loadSection('schedule')">My Schedule</a></li>
                <li><button onclick="logout()" class="btn btn-danger">Logout</button></li>
            </ul>
        </div>
    </nav>

    <div class="container dashboard-container">
        <!-- Dashboard Section -->
        <div id="dashboard" class="section">
            <h2>Welcome, <span id="teacherName"></span></h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Total Appointments</h3>
                    <p class="stat-number" id="totalAppts">0</p>
                </div>
                <div class="stat-card">
                    <h3>Pending Approvals</h3>
                    <p class="stat-number" id="pendingAppts">0</p>
                </div>
                <div class="stat-card">
                    <h3>Approved</h3>
                    <p class="stat-number" id="approvedAppts">0</p>
                </div>
                <div class="stat-card">
                    <h3>New Messages</h3>
                    <p class="stat-number" id="newMessages">0</p>
                </div>
            </div>
        </div>

        <!-- Appointments Section -->
        <div id="appointments" class="section" style="display: none;">
            <h2>Manage Appointments</h2>
            <div id="appointmentsList" class="list-container"></div>
        </div>

        <!-- Messages Section -->
        <div id="messages" class="section" style="display: none;">
            <h2>Messages from Students</h2>
            <div id="messagesList" class="list-container"></div>
        </div>

        <!-- Schedule Section -->
        <div id="schedule" class="section" style="display: none;">
            <h2>Set Your Availability</h2>
            <form id="scheduleForm">
                <div class="form-group">
                    <label for="availableDays">Available Days</label>
                    <div id="daysCheckboxes"></div>
                </div>

                <div class="form-group">
                    <label for="timeSlots">Time Slots</label>
                    <div id="timeSlots">
                        <input type="text" placeholder="e.g., 09:00-10:00" class="time-slot">
                    </div>
                    <button type="button" onclick="addTimeSlot()">Add Time Slot</button>
                </div>

                <button type="submit" class="btn btn-primary">Save Schedule</button>
            </form>
        </div>
    </div>

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

    <!-- App Scripts -->
    <script src="../src/js/utils/logger.js"></script>
    <script src="../src/js/utils/firebaseConfig.js"></script>
    <script src="../src/js/utils/authService.js"></script>
    <script src="../src/js/modules/teacher.js"></script>
    <script src="../src/js/pages/teacher-dashboard.js"></script>
</body>
</html>
